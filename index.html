<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Volunteer Form</title>
</head>

<body>

    <h1>Volunteer Form</h1>

    <form action="http://bloomingdale.sat.iit.edu/kriedan/lab3formscript.php" method="post">

        <fieldset>
            <legend>My Info</legend>

            <div>
                <label>
                    First name:
                    <input
                        type="text"
                        name="first_name_field"
                        size="100">
                </label>
            </div>

            <div>
                <label>
                    Last name:
                    <input
                        type="text"
                        name="last_name_field"
                        size="100">
                </label>
            </div>

            <div>
                <label>
                    Phone:
                    <input
                        type="text"
                        name="phone_field"
                        size="100">
                </label>
            </div>

            <div>
                <label>
                    Email:
                    <input
                        type="text"
                        name="email_field"
                        size="100">
                </label>
            </div>


            <div>
                Gender:
            </div>

            <div>

                <label>
                    Male
                    <input
                        type="radio"
                        name="gender_field"
                        value="male">
                </label>

                <label>
                    Female
                    <input
                        type="radio"
                        name="gender_field"
                        value="female">
                </label>

            </div>


            <div>
                Age:
            </div>

            <div>

                <select name="age_field">

                    <option value="under 18">
                        under 18
                    </option>

                    <option value="over 18">
                        over 18
                    </option>

                </select>

            </div>

        </fieldset>


        <br>


        <fieldset>

            <legend>My Availability</legend>

            <h2>Days Available:</h2>


            <div>

                <label>
                    Sunday
                    <input
                        type="checkbox"
                        name="available_field[]"
                        value="sunday">
                </label>

            </div>


            <div>

                <label>
                    Monday
                    <input
                        type="checkbox"
                        name="available_field[]"
                        value="monday">
                </label>

            </div>


            <div>

                <label>
                    Tuesday
                    <input
                        type="checkbox"
                        name="available_field[]"
                        value="tuesday">
                </label>

            </div>


            <div>

                <label>
                    Wednesday
                    <input
                        type="checkbox"
                        name="available_field[]"
                        value="wednesday">
                </label>

            </div>


            <div>

                <label>
                    Thursday
                    <input
                        type="checkbox"
                        name="available_field[]"
                        value="thursday">
                </label>

            </div>


            <div>

                <label>
                    Friday
                    <input
                        type="checkbox"
                        name="available_field[]"
                        value="friday">
                </label>

            </div>


            <div>

                <label>
                    Saturday
                    <input
                        type="checkbox"
                        name="available_field[]"
                        value="saturday">
                </label>

            </div>



            <h3>Comments</h3>


            <div>

                <textarea
                    name="comments_field"
                    rows="4"
                    cols="40">
                </textarea>

            </div>

        </fieldset>


        <input
            type="hidden"
            name="hidden_field"
            value="Rikki Sims">


        <br>


        <input
            type="submit"
            value="Submit Query">


    </form>

</body>

</html>
